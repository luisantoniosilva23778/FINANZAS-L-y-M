<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Finanzas Hogar</title>

<style>
body { font-family: Arial; padding:20px; }
nav button { margin-right:10px; }
section { display:none; margin-top:20px; }
section.active { display:block; }
input, select, button { margin:5px; }
</style>

</head>

<body>

<h1>Control Financiero</h1>

<nav>
    <button onclick="mostrar('cuentas')">Cuentas</button>
    <button onclick="mostrar('movimientos')">Movimientos</button>
    <button onclick="mostrar('resumen')">Resumen</button>
</nav>

<!-- CUENTAS -->
<section id="cuentas" class="active">
    <h2>Cuentas</h2>
    <input id="nombreCuenta" placeholder="Nombre cuenta">
    <input id="saldoCuenta" type="number" placeholder="Saldo">
    <button onclick="agregarCuenta()">Agregar</button>
    <ul id="listaCuentas"></ul>
</section>

<!-- MOVIMIENTOS -->
<section id="movimientos">
    <h2>Movimientos</h2>

    <select id="tipo">
        <option value="ingreso">Ingreso</option>
        <option value="gasto">Gasto</option>
    </select>

    <input id="descripcion" placeholder="Descripción">
    <input id="monto" type="number" placeholder="Monto">
    <input id="fecha" type="date">

    <button onclick="agregarMovimiento()">Guardar</button>

    <ul id="listaMovimientos"></ul>
</section>

<!-- RESUMEN -->
<section id="resumen">
    <h2>Resumen</h2>
    <p>Ingresos: <span id="totalIngresos">0</span>€</p>
    <p>Gastos: <span id="totalGastos">0</span>€</p>
    <p>Ahorro: <span id="ahorro">0</span>€</p>
</section>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyD2iWa3ScvMiqiPpic86o-jj95RRH1dWyU",
  authDomain: "finanzas-m-y-l.firebaseapp.com",
  databaseURL: "https://finanzas-m-y-l-default-rtdb.firebaseio.com",
  projectId: "finanzas-m-y-l",
  storageBucket: "finanzas-m-y-l.firebasestorage.app",
  messagingSenderId: "590213560036",
  appId: "1:590213560036:web:c03a20e0e207b3f60fdef1"
};

// Inicializar Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= ESTADO =================
let estado = {
    cuentas: [],
    movimientos: []
};

// ================= REFERENCIAS =================
const cuentasRef = ref(db, "cuentas");
const movimientosRef = ref(db, "movimientos");

// ================= ESCUCHA TIEMPO REAL =================
onValue(cuentasRef, (snapshot) => {
    estado.cuentas = [];
    snapshot.forEach(child => estado.cuentas.push(child.val()));
    render();
});

onValue(movimientosRef, (snapshot) => {
    estado.movimientos = [];
    snapshot.forEach(child => estado.movimientos.push(child.val()));
    render();
});

// ================= UI =================
window.mostrar = function (id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
};

// ================= CUENTAS =================
window.agregarCuenta = function () {
    const nombre = document.getElementById("nombreCuenta").value;
    const saldo = Number(document.getElementById("saldoCuenta").value);

    if (!nombre) return;

    push(cuentasRef, { nombre, saldo });
};

// ================= MOVIMIENTOS =================
window.agregarMovimiento = function () {
    const tipo = document.getElementById("tipo").value;
    const descripcion = document.getElementById("descripcion").value;
    const monto = Number(document.getElementById("monto").value);
    const fecha = document.getElementById("fecha").value;

    if (!descripcion || !monto) return;

    push(movimientosRef, { tipo, descripcion, monto, fecha });
};

// ================= LOGICA =================
function calcularResumen() {
    let ingresos = 0;
    let gastos = 0;

    estado.movimientos.forEach(m => {
        if (m.tipo === "ingreso") ingresos += m.monto;
        else gastos += m.monto;
    });

    return {
        ingresos,
        gastos,
        ahorro: ingresos - gastos
    };
}

// ================= RENDER =================
function render() {

    const ulC = document.getElementById("listaCuentas");
    ulC.innerHTML = "";
    estado.cuentas.forEach(c => {
        ulC.innerHTML += `<li>${c.nombre} - ${c.saldo}€</li>`;
    });

    const ulM = document.getElementById("listaMovimientos");
    ulM.innerHTML = "";
    estado.movimientos.forEach(m => {
        ulM.innerHTML += `<li>${m.tipo} - ${m.descripcion} - ${m.monto}€</li>`;
    });

    const r = calcularResumen();
    document.getElementById("totalIngresos").innerText = r.ingresos;
    document.getElementById("totalGastos").innerText = r.gastos;
    document.getElementById("ahorro").innerText = r.ahorro;
}

</script>

</body>
</html>
