<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Finanzas Hogar</title>

<style>
body { font-family: Arial; padding:20px; }
section { display:none; }
.active { display:block; }
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="active">
    <h2>Login</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app">

<h1>Control Financiero</h1>

<button onclick="mostrar('cuentas')">Cuentas</button>
<button onclick="mostrar('movimientos')">Movimientos</button>
<button onclick="mostrar('resumen')">Resumen</button>

<section id="cuentas" class="active">
    <h2>Cuentas</h2>
    <input id="nombreCuenta">
    <input id="saldoCuenta" type="number">
    <button onclick="agregarCuenta()">Agregar</button>
    <ul id="listaCuentas"></ul>
</section>

<section id="movimientos">
    <h2>Movimientos</h2>

    <select id="tipo">
        <option value="ingreso">Ingreso</option>
        <option value="gasto">Gasto</option>
    </select>

    <input id="descripcion">
    <input id="monto" type="number">
    <input id="fecha" type="date">

    <button onclick="agregarMovimiento()">Guardar</button>

    <ul id="listaMovimientos"></ul>
</section>

<section id="resumen">
    <h2>Resumen</h2>
    <p>Ingresos: <span id="totalIngresos">0</span></p>
    <p>Gastos: <span id="totalGastos">0</span></p>
    <p>Ahorro: <span id="ahorro">0</span></p>
</section>

</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2iWa3ScvMiqiPpic86o-jj95RRH1dWyU",
  authDomain: "finanzas-m-y-l.firebaseapp.com",
  databaseURL: "https://finanzas-m-y-l-default-rtdb.firebaseio.com",
  projectId: "finanzas-m-y-l"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================= LOGIN =================
window.login = function () {
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if (user === "admin" && pass === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Usuario o contraseña incorrectos";
    }
};

// ================= ESTADO =================
let estado = { cuentas: [], movimientos: [] };

const cuentasRef = ref(db, "cuentas");
const movimientosRef = ref(db, "movimientos");

onValue(cuentasRef, (snap) => {
    estado.cuentas = [];
    snap.forEach(c => estado.cuentas.push(c.val()));
    render();
});

onValue(movimientosRef, (snap) => {
    estado.movimientos = [];
    snap.forEach(m => estado.movimientos.push(m.val()));
    render();
});

// ================= FUNCIONES =================
window.mostrar = function(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
};

window.agregarCuenta = function(){
    push(cuentasRef, {
        nombre: nombreCuenta.value,
        saldo: Number(saldoCuenta.value)
    });
};

window.agregarMovimiento = function(){
    push(movimientosRef, {
        tipo: tipo.value,
        descripcion: descripcion.value,
        monto: Number(monto.value),
        fecha: fecha.value
    });
};

// ================= LOGICA =================
function calcularResumen(){
    let ingresos = 0, gastos = 0;

    estado.movimientos.forEach(m=>{
        if(m.tipo==="ingreso") ingresos+=m.monto;
        else gastos+=m.monto;
    });

    return { ingresos, gastos, ahorro: ingresos-gastos };
}

// ================= RENDER =================
function render(){

    listaCuentas.innerHTML="";
    estado.cuentas.forEach(c=>{
        listaCuentas.innerHTML += `<li>${c.nombre} - ${c.saldo}</li>`;
    });

    listaMovimientos.innerHTML="";
    estado.movimientos.forEach(m=>{
        listaMovimientos.innerHTML += `<li>${m.tipo} - ${m.descripcion} - ${m.monto}</li>`;
    });

    const r = calcularResumen();
    totalIngresos.innerText = r.ingresos;
    totalGastos.innerText = r.gastos;
    ahorro.innerText = r.ahorro;
}

</script>

</body>
</html>
